name: codeql

# First-party CodeQL dataflow analysis of the Go daemon. This is distinct from
# the semgrep SARIF upload in security.yml: that uploads a third-party SAST
# report into the Security tab, whereas this runs CodeQL's own taint/dataflow
# engine over the compiled module.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly cron: Monday at 02:00 UTC. Offset one day from security.yml's
    # Sunday cron so the two scheduled scans do not contend for a runner.
    - cron: '0 2 * * 1'

permissions:
  contents: read
  security-events: write
  # CodeQL reads the workflow run metadata; required on private repos and
  # harmless on a public one.
  actions: read

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [go]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      # build-mode: manual with an explicit build below. Autobuild can miss
      # packages guarded by build tags; an explicit `go build ./...` compiles
      # every package the daemon ships so CodeQL extracts the whole module.
      # security-and-quality is the broadest query suite — appropriate for a
      # security-sensitive daemon.
      - name: initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: ${{ matrix.language }}
          build-mode: manual
          queries: security-and-quality
      - name: build (manual)
        run: CGO_ENABLED=0 go build ./...
      - name: analyze
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: "/language:${{ matrix.language }}"
          # Emit the SARIF locally so the gate step below can inspect it. Results
          # are still uploaded to the Security tab (upload defaults to true).
          output: sarif-results
      # codeql-action/analyze uploads results to the Security tab but exits 0
      # REGARDLESS of findings, so this job was green even on a real vulnerability
      # (a fake-green: the security job runs but never blocks). Gate the job
      # explicitly on error-level results — CodeQL emits its high/critical
      # security queries (e.g. go/command-injection, security-severity >= 7.0) at
      # SARIF level "error", while maintainability/quality queries surface as
      # warning/note. So this blocks a merge on a high-severity security finding
      # yet lets quality noise pass (it still appears in the Security tab). Only
      # once this job is meaningful is adding it to branch-protection
      # required_status_checks worth doing — required + always-green would be
      # fake-green in the second degree.
      - name: gate on error-level CodeQL findings
        run: |
          shopt -s nullglob
          total=0
          for f in sarif-results/*.sarif; do
            n=$(jq '[.runs[].results[]? | select(.level == "error")] | length' "$f")
            echo "  $f: $n error-level result(s)"
            total=$((total + n))
          done
          echo "CodeQL error-level findings: $total"
          if [ "$total" -gt 0 ]; then
            echo "::error::CodeQL reported $total error-level result(s) — see the Security tab"
            exit 1
          fi
