name: codeql

# First-party CodeQL dataflow analysis of the Go daemon. This is distinct from
# the semgrep SARIF upload in security.yml: that uploads a third-party SAST
# report into the Security tab, whereas this runs CodeQL's own taint/dataflow
# engine over the compiled module.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly cron: Monday at 02:00 UTC. Offset one day from security.yml's
    # Sunday cron so the two scheduled scans do not contend for a runner.
    - cron: '0 2 * * 1'

permissions:
  contents: read
  security-events: write
  # CodeQL reads the workflow run metadata; required on private repos and
  # harmless on a public one.
  actions: read

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [go]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
      # build-mode: manual with an explicit build below. Autobuild can miss
      # packages guarded by build tags; an explicit `go build ./...` compiles
      # every package the daemon ships so CodeQL extracts the whole module.
      # security-and-quality is the broadest query suite — appropriate for a
      # security-sensitive daemon.
      - name: initialize CodeQL
        uses: github/codeql-action/init@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3.36.2
        with:
          languages: ${{ matrix.language }}
          build-mode: manual
          queries: security-and-quality
      - name: build (manual)
        run: CGO_ENABLED=0 go build ./...
      - name: analyze
        uses: github/codeql-action/analyze@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3.36.2
        with:
          category: "/language:${{ matrix.language }}"
