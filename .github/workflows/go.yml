name: go

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: go-${{ github.ref }}
  cancel-in-progress: false

jobs:
  gofmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
      # Drift guard: cross-check the two independent copies of the Go toolchain
      # version in the tree — the `go` directive in go.mod and the golang:<tag>
      # builder image pinned in the Dockerfile. Fails the job if they diverge,
      # so bumping one without the other cannot reach a merge.
      - name: Go version drift guard (go.mod vs Dockerfile)
        run: make goversion-guard
      - name: gofmt -l (fail on any unformatted file)
        run: |
          set -euo pipefail
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::gofmt found unformatted files:"
            echo "$unformatted"
            exit 1
          fi
          echo "gofmt clean"

  vet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
      - name: go vet
        run: go vet ./...

  staticcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
      - name: install staticcheck
        # Pin to the exact commit the 2026.1 tag points to, not the bare
        # calendar tag: govulncheck/cosign pin exact versions, and the bare
        # 2026.1 tag would float onto later 2026.1.x patches so a rule change
        # could flip this lint gate red/green between two runs of the same
        # commit. The 2026.1 release ships no separate patch tag yet, so the
        # immutable commit SHA is the tightest pin available.
        run: go install honnef.co/go/tools/cmd/staticcheck@5a501ea53df483ea698b8a046cd3a8e8b6ae7620 # 2026.1
      - name: staticcheck
        run: staticcheck ./...

  # deadcode is whole-program reachability: it surfaces an unreachable EXPORTED
  # function that package-scoped unused-analysis (golangci `unused`/staticcheck
  # U1000) structurally cannot see. ADVISORY this round — the job carries
  # continue-on-error so a finding annotates the run red WITHOUT blocking the
  # build (matching the gremlins mutation ratchet pattern; a blocking flip is a
  # later ratchet). The STEP still uses the exit-1 wrapper because the tool EXITS
  # 0 even when it prints findings (golang/go#64713): a bare `deadcode -test
  # ./...` would be a permanent-green no-op, so we capture the output, print it,
  # and exit 1 when it is non-empty.
  deadcode:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
      - name: whole-program deadcode (advisory; exit-1 wrapper around the exit-0 tool)
        run: |
          set -uo pipefail
          out=$(go run golang.org/x/tools/cmd/deadcode@v0.30.0 -test ./...)
          echo "$out"
          test -z "$out" || { echo "::error::deadcode found unreachable function(s) — see output above"; exit 1; }

  # golangci runs the structural meta-linter (.golangci.yml): the security and
  # correctness set (gosec, errorlint, bodyclose, ...) that the single-purpose
  # jobs above do not cover. staticcheck/vet are also re-run by it for local
  # parity but their authoritative gate is their own job. Pinned to the same
  # tool version `make lint` installs so a finding never flips between the two.
  golangci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
      - name: golangci-lint
        # The action is pinned to the dereferenced commit SHA of its v8.0.0
        # release (v8 tracks golangci-lint v2). The `version` input pins the
        # tool itself to an exact release so the gate is reproducible — a bare
        # tag would float onto later patches and could flip a rule red/green
        # between two runs of the same commit.
        uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9 # v8.0.0
        with:
          version: v2.12.2
          args: --timeout=5m

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
      - name: go test
        run: go test ./...

  # race runs the whole suite under the race detector (T1-14): the daemon is
  # concurrency-heavy (accept gate, per-session ceilings, streaming pipes,
  # signal-driven shutdown), so a silent data race is a correctness hole the
  # plain test job cannot see. Gated tests (live S3, real-binary e2e) skip
  # here exactly as they do in the test job.
  race:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
      - name: go test -race
        run: go test -race ./... -timeout 600s

  # s3-conformance proves the S3 engine against a REAL MinIO backend on
  # every PR: the engine-neutral conformance suite's S3 leg plus the full
  # S3Live slice. No mocks — the rig is the committed compose file. The
  # `-engine s3` live-BINARY e2e leg is NOT here: it needs the composed
  # daemon (credentials + storage lane), so it lands with the composition
  # task in e2e.yml.
  s3-conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
      - name: boot the MinIO rig
        run: |
          docker compose -f deploy/docker-compose.test.yml up -d --wait minio
          docker compose -f deploy/docker-compose.test.yml run --rm bucket-init
      - name: conformance + live S3 slice against real MinIO
        env:
          OCU_S3_TEST_ENDPOINT: http://127.0.0.1:9000
          OCU_S3_TEST_BUCKET: ocu-conformance
          OCU_S3_TEST_VERSIONED_BUCKET: ocu-conformance-versioned
          OCU_S3_TEST_ACCESS_KEY: ocu-test-root
          OCU_S3_TEST_SECRET_KEY: ocu-test-secret-key
        # Capture -json so we can both surface a readable log AND positively
        # assert the LIVE S3 leg actually ran. The live S3 cases t.Skip when
        # the rig env is unset/mistyped, and a skip counts as a pass — an
        # endpoint-var typo would otherwise report green while exercising
        # nothing. Run once, tee the json to disk, render a readable log from
        # its Output fields, then gate on the captured stream.
        run: |
          set -uo pipefail
          code=0
          go test ./internal/objectstore/ -run 'Conformance|S3' -json -timeout 600s -count=1 \
            | tee /tmp/s3-conformance.json >/dev/null || code=$?
          # Render a readable log from the captured stream for the job output.
          grep -oE '"Output":"[^"]*"' /tmp/s3-conformance.json \
            | sed -E 's/^"Output":"//; s/"$//' | sed -E 's/\\n$//; s/\\t/\t/g' || true
          # Fail the job unless at least one LIVE S3 case reached a real pass
          # (not a skip). The top-level TestConformance_S3 parent reports pass
          # even when all its subtests skip, so it is NOT a liveness signal;
          # the conformance SUBTESTS (TestConformance_S3/...) and the
          # top-level TestS3Live_* cases pass only when the rig was reached.
          passed=$(grep -E '"Action":"pass"' /tmp/s3-conformance.json \
            | grep -cE '"Test":"(TestConformance_S3/[^"]+|TestS3Live_[A-Za-z0-9_]+)"' || true)
          if [ "${passed:-0}" -eq 0 ]; then
            echo "::error::no live S3 case passed — the MinIO rig env did not reach the suite (every live case skipped)"
            exit 1
          fi
          echo "live S3 leg ran: $passed live S3 case(s) passed against real MinIO"
          # Propagate any real test failure from the single run above.
          exit "$code"
      - name: tear the rig down
        if: always()
        run: docker compose -f deploy/docker-compose.test.yml down -v

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
      # Gate the internal/ packages — the broker's real logic. The cmd/
      # wrapper is thin and deliberately excluded. The floor guards against
      # regression and ratchets up as the implementation PRs land.
      #
      # The MinIO rig runs INSIDE this job so the gated S3 tests execute
      # during coverage collection and engine_s3.go counts toward the floor
      # — the floor is never lowered to absorb the S3 engine (13-12).
      - name: boot the MinIO rig (S3 leg counts toward the floor)
        run: |
          docker compose -f deploy/docker-compose.test.yml up -d --wait minio
          docker compose -f deploy/docker-compose.test.yml run --rm bucket-init
      - name: collect coverage (internal packages, S3 leg included)
        env:
          OCU_S3_TEST_ENDPOINT: http://127.0.0.1:9000
          OCU_S3_TEST_BUCKET: ocu-conformance
          OCU_S3_TEST_VERSIONED_BUCKET: ocu-conformance-versioned
          OCU_S3_TEST_ACCESS_KEY: ocu-test-root
          OCU_S3_TEST_SECRET_KEY: ocu-test-secret-key
        run: go test -coverpkg=./internal/... -coverprofile=cover.out ./internal/... -timeout 600s -count=1
      # A healthy run is ~20s; if the suite needs anywhere near 600s the
      # backend rig is degraded and the right outcome is a fast, named FAIL —
      # not a quarter-hour false-green. Dump rig health on EVERY outcome so a
      # degraded backend identifies itself in the log.
      - name: rig diagnostics (always, names a degraded backend)
        if: always()
        run: |
          docker compose -f deploy/docker-compose.test.yml logs --tail 200 minio || true
          docker stats --no-stream || true
          df -h || true
      - name: tear the rig down
        if: always()
        run: docker compose -f deploy/docker-compose.test.yml down -v
      - name: enforce the line-coverage floor
        run: |
          set -euo pipefail
          total=$(go tool cover -func=cover.out | awk '/^total:/ {gsub(/%/,"",$3); print $3}')
          # Ratcheted in PR-11 (daemon wiring + e2e): the integrated suite
          # measures 87.7% over ./internal/... on a host where the live-socket
          # e2e cases run (Linux CI) or loud-skip (darwin, peer-cred gate). The
          # floor is floor(measured)-1 = 86.0 — one point of headroom, never
          # above measured — clearing the >=80% release-readiness target.
          floor=86.0
          awk -v t="$total" -v f="$floor" 'BEGIN {
            if (t+0 < f+0) { printf "::error::go internal coverage %.1f%% below floor %.1f%%\n", t, f; exit 1 }
            printf "go internal coverage %.1f%% >= floor %.1f%%\n", t, f
          }'
      - name: upload the coverage profile
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: go-coverage-profile
          path: cover.out

  # govulncheck scans the module graph against the Go vulnerability database
  # (T2-10, SUPPLY-03). Fails on known-exploitable vulnerabilities in code
  # reachable from this module. govulncheck@v1.3.0 is pinned by module
  # version (the tool ships no separate binary release).
  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
      - name: install govulncheck (pinned)
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.3.0
      - name: govulncheck
        run: govulncheck ./...

  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      # Check out the canonical architecture repo so the byte-identity gate
      # actually enforces in CI; without this the script's skip branch would
      # make the gate dead on every runner.
      #
      # PIN the canon to the immutable commit SHA whose contracts/storage/
      # tree is byte-identical to our vendored copies (file-ops.schema.json
      # and file-artifact-api.schema.json; we do not vendor mount-config).
      # We vendor only those two files — mount-config belongs to the guest.
      #
      # The prior pin (0ebf93e) was the commit the v0.9.6.0 tag pointed to
      # when we first vendored; the canon remote later moved that tag to a
      # different commit (23ffdc9) that does not contain contracts/storage/
      # at all, and the old 0ebf93e ref was dropped from the remote. The
      # new pin below is the canon HEAD that does carry those contracts and
      # is verified byte-identical. Bump this SHA deliberately when
      # re-vendoring; verify byte-identity (sha256) before bumping.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          repository: Wide-Moat/open-computer-use
          ref: 73e82c66a2df834683276ead83aa1571a1476ed0
          path: canon
      - name: SPDX header presence
        run: bash scripts/check-spdx.sh
      - name: maintainer identity
        run: bash scripts/check-doc-identity.sh
      - name: vendored contract identity
        env:
          OCU_CANON_DIR: canon
        run: bash scripts/check-contract-identity.sh
