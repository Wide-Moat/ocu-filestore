name: e2e

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # build-broker builds the static broker daemon and publishes it as a
  # same-run artifact. The e2e job consumes it via needs: +
  # download-artifact@v4 IN THE SAME RUN — no run-id/token cross-workflow
  # mode (that is the race-prone anti-pattern and is NOT used).
  build-broker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
      - name: static build of ocu-filestored
        run: CGO_ENABLED=0 go build -trimpath -o ocu-filestored ./cmd/ocu-filestored
      - name: upload the broker binary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ocu-filestored
          path: ocu-filestored
          if-no-files-found: error
          retention-days: 1

  # e2e is the RELEASE-GATING job: it exercises the REAL daemon binary —
  # no mocks. It is a REQUIRED check — no continue-on-error. Today the
  # daemon is a wiring scaffold that validates its flag surface and refuses
  # with a typed error; the smoke below asserts exactly that observable
  # behaviour. The Integration|E2E test slice grows with the south-face
  # implementation PRs (real unix socket, real peer-cred drop, real
  # audit-deny) and runs under this same job.
  e2e:
    runs-on: ubuntu-latest
    needs: build-broker
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
      - name: download the broker binary (same run)
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: ocu-filestored
      - name: make the broker binary executable
        run: chmod +x ocu-filestored
      - name: smoke — the real daemon refuses bad invocations pre-bind
        # All three pre-bind refusals (missing required flag, unknown engine,
        # -engine s3 without a storage lane naming ADR-0011 — NFR-SEC-16/85)
        # live in ONE committed script so e2e and release assert the SAME
        # invariants against the SAME binary, never drifting YAML copies.
        run: bash scripts/e2e-smoke.sh ./ocu-filestored
      - name: run the Integration + E2E slice (local-volume leg)
        env:
          OCU_BROKER_BIN: ${{ github.workspace }}/ocu-filestored
        run: go test -run 'Integration|E2E' ./... -v -timeout 600s

  # docker-build catches go.mod / Dockerfile toolchain drift on every PR and
  # push to main — the class of bug where go.mod advances past the builder
  # image's Go version, causing `go mod download` to fail inside the container.
  # A single-arch linux/amd64 build is sufficient to catch the mismatch fast;
  # the full multi-platform push happens in release.yml. This job must never
  # push (no registry credentials are supplied or needed).
  docker-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - name: build the broker image (no push — toolchain mismatch gate)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          platforms: linux/amd64
          push: false

  # e2e-s3 is the same release-gating live-binary slice re-pointed at the
  # REAL s3 engine against the committed MinIO rig: `-engine s3` serves live
  # MinIO through the full daemon (ADR-0010 — both kinds real). The
  # dev-direct dial is the rig posture only; the production lane refusal is
  # pinned by the smoke above. The slice includes the composed
  # credential-redaction check (TestE2ES3CredentialRedaction).
  e2e-s3:
    runs-on: ubuntu-latest
    needs: build-broker
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
      - name: download the broker binary (same run)
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: ocu-filestored
      - name: make the broker binary executable
        run: chmod +x ocu-filestored
      - name: boot the MinIO rig
        run: |
          docker compose -f deploy/docker-compose.test.yml up -d --wait minio
          docker compose -f deploy/docker-compose.test.yml run --rm bucket-init
      - name: run the Integration + E2E slice (s3 leg, live MinIO)
        env:
          OCU_BROKER_BIN: ${{ github.workspace }}/ocu-filestored
          OCU_E2E_ENGINE: s3
          OCU_S3_TEST_ENDPOINT: http://127.0.0.1:9000
          OCU_S3_TEST_BUCKET: ocu-conformance
          OCU_S3_TEST_VERSIONED_BUCKET: ocu-conformance-versioned
          OCU_S3_TEST_ACCESS_KEY: ocu-test-root
          OCU_S3_TEST_SECRET_KEY: ocu-test-secret-key
        # Capture -json and positively assert the S3-engine leg actually ran.
        # The s3 e2e cases t.Skip when OCU_E2E_ENGINE/rig env do not reach the
        # suite (or OCU_BROKER_BIN is unset), and a skip counts as a pass — a
        # var typo would otherwise report green while exercising no live S3.
        # TestE2ES3CredentialRedaction runs ONLY on the s3 leg, so its real
        # pass is the unique liveness signal for this job.
        run: |
          set -uo pipefail
          code=0
          go test -run 'Integration|E2E' ./... -json -timeout 600s \
            | tee /tmp/e2e-s3.json >/dev/null || code=$?
          grep -oE '"Output":"[^"]*"' /tmp/e2e-s3.json \
            | sed -E 's/^"Output":"//; s/"$//; s/\\n$//; s/\\t/\t/g' || true
          if ! grep -E '"Action":"pass"' /tmp/e2e-s3.json \
            | grep -qE '"Test":"TestE2ES3CredentialRedaction"'; then
            echo "::error::the s3-leg e2e case TestE2ES3CredentialRedaction did not pass — the rig/engine env never reached the live slice (every s3 case skipped)"
            exit 1
          fi
          echo "s3 e2e leg ran: TestE2ES3CredentialRedaction passed against real MinIO"
          exit "$code"
      - name: tear the rig down
        if: always()
        run: docker compose -f deploy/docker-compose.test.yml down -v
