name: e2e

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # build-broker builds the static broker daemon and publishes it as a
  # same-run artifact. The e2e job consumes it via needs: +
  # download-artifact@v4 IN THE SAME RUN — no run-id/token cross-workflow
  # mode (that is the race-prone anti-pattern and is NOT used).
  build-broker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - name: static build of ocu-filestored
        run: CGO_ENABLED=0 go build -trimpath -o ocu-filestored ./cmd/ocu-filestored
      - name: upload the broker binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ocu-filestored
          path: ocu-filestored
          if-no-files-found: error
          retention-days: 1

  # e2e is the RELEASE-GATING job: it exercises the REAL daemon binary —
  # no mocks. It is a REQUIRED check — no continue-on-error. The daemon serves
  # a TLS HTTPS/HTTP-2 REST listener; the smoke below asserts the pre-bind
  # typed-error refusals, and the Integration|E2E slice then drives the live
  # daemon over localhost TLS REST: it mints a throwaway loopback certificate,
  # starts the binary with -tls-cert/-tls-key, presents an edge-injected
  # Authorization: Bearer, and runs the non-vacuous file-op lifecycle
  # (makeDirectory -> fileUpload -> readFile/listDirectory -> fileDownload
  # byte-exact -> removeFile -> listing reflects the removal) plus the
  # foreign-scope 403 and missing-bearer 401 denies. No Docker is needed for
  # this leg — the listener is loopback TLS.
  #
  # TODO(container-leg): the architect's bar is the same live slice over the
  # real runc/Docker mount substrate (guest -> Egress edge -> service direct
  # HTTPS). That run needs a Linux runner with runc available and the edge rig
  # stood up; it is tracked as the deferred container-e2e leg and is NOT part
  # of this code-only wave.
  e2e:
    runs-on: ubuntu-latest
    needs: build-broker
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - name: download the broker binary (same run)
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: ocu-filestored
      - name: make the broker binary executable
        run: chmod +x ocu-filestored
      - name: smoke — the real daemon refuses bad invocations pre-bind
        # All three pre-bind refusals (a missing required flag named — -tls-cert,
        # a load-bearing flag of the TLS REST transport; an unknown engine; an
        # -engine s3 with its required backing-store config absent) live in ONE
        # committed script so e2e and release assert the SAME invariants against
        # the SAME binary, never drifting YAML copies.
        run: bash scripts/e2e-smoke.sh ./ocu-filestored
      - name: run the Integration + E2E slice (local-volume leg, live TLS REST)
        env:
          OCU_BROKER_BIN: ${{ github.workspace }}/ocu-filestored
        run: go test -run 'Integration|E2E' ./... -v -timeout 600s

  # docker-build catches go.mod / Dockerfile toolchain drift on every PR and
  # push to main — the class of bug where go.mod advances past the builder
  # image's Go version, causing `go mod download` to fail inside the container.
  # A single-arch linux/amd64 build is sufficient to catch the mismatch fast;
  # the full multi-platform push happens in release.yml. This job must never
  # push (no registry credentials are supplied or needed).
  docker-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - name: build the broker image (no push — toolchain mismatch gate)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          platforms: linux/amd64
          push: false

  # e2e-s3 exercises the REAL s3 engine against the committed MinIO rig: the
  # composed daemon serves live MinIO through the full stack (ADR-0010 — both
  # kinds real) over a real south-face TLS listener, and the objectstore
  # conformance/live legs drive the engine verbs against the rig. The
  # production lane posture is pinned by the smoke above; the rig dials the
  # backend direct. The liveness signal is TestComposeS3RealEngineServes: it
  # composes the real s3 engine, provisions a scope against MinIO, and serves on
  # a real TLS listener — so its pass proves the rig env reached the suite (a
  # skip would otherwise report green while exercising no live S3).
  e2e-s3:
    runs-on: ubuntu-latest
    needs: build-broker
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - name: download the broker binary (same run)
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: ocu-filestored
      - name: make the broker binary executable
        run: chmod +x ocu-filestored
      - name: red-probe the s3-leg liveness gate (two-sided, before the rig)
        # Prove the liveness assertion does not lie in either direction BEFORE
        # spending a MinIO rig boot on it: a real pass -> exit 0, a skipped or
        # absent target -> non-zero. Fails fast if the gate itself regresses.
        run: bash scripts/check-s3-leg-ran-redprobe.sh
      - name: boot the MinIO rig
        run: |
          docker compose -f deploy/docker-compose.test.yml up -d --wait minio
          docker compose -f deploy/docker-compose.test.yml run --rm bucket-init
      - name: run the s3 live legs (composed daemon + objectstore, live MinIO)
        env:
          OCU_BROKER_BIN: ${{ github.workspace }}/ocu-filestored
          OCU_S3_TEST_ENDPOINT: http://127.0.0.1:9000
          OCU_S3_TEST_BUCKET: ocu-conformance
          OCU_S3_TEST_VERSIONED_BUCKET: ocu-conformance-versioned
          OCU_S3_TEST_ACCESS_KEY: ocu-test-root
          OCU_S3_TEST_SECRET_KEY: ocu-test-secret-key
        # Capture -json and positively assert the S3-engine leg actually ran.
        # The s3 live cases t.Skip when OCU_S3_TEST_ENDPOINT does not reach the
        # suite, and a skip counts as a pass — a var typo would otherwise report
        # green while exercising no live S3. TestComposeS3RealEngineServes runs
        # ONLY against the rig, so its real pass is the unique liveness signal.
        #
        # The liveness assertion lives in scripts/check-s3-leg-ran.sh (single
        # source, red-probed below): it jq-selects the test's own pass object
        # from the go-test-json stream — robust to JSON field order and line
        # buffering, unlike a two-stage grep pipe which false-reds a real green.
        run: |
          set -uo pipefail
          code=0
          go test ./cmd/ocu-filestored/... ./internal/objectstore/... -json -timeout 600s \
            | tee /tmp/e2e-s3.json >/dev/null || code=$?
          grep -oE '"Output":"[^"]*"' /tmp/e2e-s3.json \
            | sed -E 's/^"Output":"//; s/"$//; s/\\n$//; s/\\t/\t/g' || true
          bash scripts/check-s3-leg-ran.sh /tmp/e2e-s3.json
          exit "$code"
      - name: tear the rig down
        if: always()
        run: docker compose -f deploy/docker-compose.test.yml down -v
