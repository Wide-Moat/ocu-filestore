name: mutation

# Mutation testing measures assertion strength: it rewrites covered source
# (a `+` becomes a `-`, a `>` becomes a `>=`, a condition is negated) and
# re-runs the suite. A mutant the tests still pass on ("LIVED") is a line the
# suite executes but does not actually assert on — a gap line coverage cannot
# see. This gate runs go-gremlins (https://github.com/go-gremlins/gremlins)
# scoped to the pure-logic leaf packages where the signal is highest and the
# suite is fast: the authorization resolver, the deny-class vocabulary, and the
# per-session ceilings. The S3 / socket / streaming packages are excluded on
# purpose — they need the live MinIO rig and the peer-credential socket, which
# would make a mutation run enormous for little added signal over their own
# conformance and e2e suites. The scope lives in .gremlins.yaml at the repo
# root (coverpkg) so it is declared once.
#
# ADVISORY (continue-on-error: true) for now. gremlins is slow and its
# coverage-to-mutant position matching is not yet reliable on this repo's Go
# toolchain — it can report covered lines as "NOT COVERED", which would make a
# blocking threshold meaningless. Running it advisory surfaces the efficacy
# summary in the job log without gating merges.
#
# Ratchet plan: once gremlins reports a stable, correct efficacy figure on the
# pinned Go toolchain, set unleash.threshold.efficacy /
# unleash.threshold.mutant-coverage in .gremlins.yaml to floor(baseline) and
# drop continue-on-error below so a regression in assertion strength fails the
# gate.

on:
  pull_request:
    branches: [main]
  schedule:
    # Weekly, Monday 03:00 UTC — keeps a baseline visible even when no PR has
    # run it recently, without putting a slow job on the hot push-to-main path.
    - cron: '0 3 * * 1'

permissions:
  contents: read

concurrency:
  # Advisory job — safe to cancel a superseded run on the same ref.
  group: mutation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gremlins:
    runs-on: ubuntu-latest
    # ADVISORY: never blocks merge. See the ratchet plan in the header before
    # removing this line.
    continue-on-error: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - name: install go-gremlins (pinned)
        # Pinned to the v0.6.0 release commit
        # (e05b1d47b8c55748e50abc28ff6b132c536bacca). The bare module version is
        # acceptable here because go install resolves it to that immutable commit
        # via the checksum database; the comment records the SHA for auditors.
        run: go install github.com/go-gremlins/gremlins/cmd/gremlins@v0.6.0
      - name: gremlins unleash (pure-logic packages — advisory)
        # gremlins unleash takes a single path argument (the files to mutate),
        # so the scoped packages are run in a loop. The coverpkg scope is read
        # from .gremlins.yaml at the repo root. The job is advisory
        # (continue-on-error above), so this step emits the per-package
        # efficacy/coverage summary and never fails the run.
        #
        # The two highest-stakes containment guards live in rig-heavy packages,
        # so they are mutated with --exclude-files trimming the package down to
        # the single guard source file (the rig source — engine_s3.go, the
        # streaming/socket handlers — is excluded; it needs the live MinIO rig).
        # RE2 has no negative lookahead, so the exclusion is a positive
        # enumeration of every other source file, path-anchored on the package
        # dir so the directory name itself is not matched.
        run: |
          set -u
          for pkg in ./internal/authz/ ./internal/denyclass/ ./internal/ceilings/; do
            echo "::group::gremlins unleash $pkg"
            gremlins unleash "$pkg" || echo "::warning::gremlins reported a non-zero exit for $pkg (advisory)"
            echo "::endgroup::"
          done
          # pathresolver.go guard (objectstore): exclude the S3/local engine,
          # credentials, and package-root source so only pathresolver.go is
          # mutated. gremlins matches this package's exclude regexp against the
          # file BASENAME, so each token is anchored with (^|/).
          echo "::group::gremlins unleash internal/objectstore/pathresolver.go"
          gremlins unleash \
            --exclude-files '(^|/)credentials\.go|(^|/)engine_local\.go|(^|/)engine_s3\.go|(^|/)objectstore\.go' \
            ./internal/objectstore/ \
            || echo "::warning::gremlins reported a non-zero exit for pathresolver.go (advisory)"
          echo "::endgroup::"
          # credscope.go guard (southface): exclude every other source file in
          # the package (all rig / streaming / socket handlers). gremlins matches
          # this package's exclude regexp against the package-relative PATH, so
          # each token is prefixed with the package dir (southface/...). The
          # southface/ prefix also disambiguates scope.go from credscope.go.
          echo "::group::gremlins unleash internal/southface/credscope.go"
          SF_EXC=$(ls internal/southface/*.go | grep -v _test | grep -v 'credscope.go' \
            | sed 's#internal/##; s/\./\\./g' | paste -sd'|' -)
          gremlins unleash --exclude-files "$SF_EXC" ./internal/southface/ \
            || echo "::warning::gremlins reported a non-zero exit for credscope.go (advisory)"
          echo "::endgroup::"
