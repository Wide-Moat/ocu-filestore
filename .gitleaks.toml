# gitleaks configuration for the ocu-filestore repository.
#
# A gitleaks config auto-loaded from the repository root REPLACES the
# built-in ruleset unless it explicitly extends it. Without the [extend]
# block below, the scanner would run with ZERO detection rules — every
# scan would report "no leaks found" no matter what was committed
# (a silently vacuous, always-green secrets gate). [extend].useDefault
# pulls in the full built-in ruleset first; the allowlist that follows
# then suppresses only documented false positives on top of it.
[extend]
  # Load the built-in gitleaks ruleset. This is load-bearing: the CI
  # secrets gate (.github/workflows/security.yml) runs `gitleaks detect`
  # with no --config flag, so this root file is auto-detected and, absent
  # useDefault, would substitute emptiness for the default rules.
  useDefault = true

# The allowlist below suppresses a single documented false positive by its
# EXACT value, and nothing else. It deliberately carries NO `paths` (or
# `commits`/`stopwords`) condition: within one gitleaks allowlist the
# conditions are OR-combined, so adding `paths = ["docs/"]` would suppress
# EVERY finding whose file is under docs/ — a real credential committed to any
# doc would then pass the gate silently. Scoping by the exact public example
# value keeps the suppression to that one constant, repo-wide, with no path
# blanket. (matchCondition = "AND" is not a fix here: gitleaks v8.30.1 ignores
# it.)

[allowlist]
  description = "Documented false positive: the public AWS-example secret key"

  # "wJalrXUtnFEMI/K7MDENG" is the canonical AWS-documentation example secret
  # access key that has appeared in Amazon's official SDK and IAM guides for
  # over a decade. It appears in docs/engines.md and docs/operations.md to
  # illustrate the two-line credential file format required by the broker's
  # -s3-credential-file flag. This value is publicly known, widely published,
  # and carries no authentication capability against any real AWS account, so
  # suppressing it by its exact value repo-wide is safe. Any OTHER secret —
  # including one in a doc file — is still caught.
  regexes = [
    "wJalrXUtnFEMI/K7MDENG",
  ]
