# gitleaks configuration for the ocu-filestore repository.
#
# A gitleaks config auto-loaded from the repository root REPLACES the
# built-in ruleset unless it explicitly extends it. Without the [extend]
# block below, the scanner would run with ZERO detection rules — every
# scan would report "no leaks found" no matter what was committed
# (a silently vacuous, always-green secrets gate). [extend].useDefault
# pulls in the full built-in ruleset first; the allowlist that follows
# then suppresses only documented false positives on top of it.
[extend]
  # Load the built-in gitleaks ruleset. This is load-bearing: the CI
  # secrets gate (.github/workflows/security.yml) runs `gitleaks detect`
  # with no --config flag, so this root file is auto-detected and, absent
  # useDefault, would substitute emptiness for the default rules.
  useDefault = true

# Each entry below is a documented false positive: a well-known example
# value from public AWS documentation that appears in our own docs to
# show the credential-file format accepted by the broker.  No real
# credentials are committed; entries here are scoped as tightly as
# possible (regex on the exact example value, confined to doc files).

[allowlist]
  description = "Documented false positives: AWS example credentials in docs"

  # "wJalrXUtnFEMI/K7MDENG" is the canonical AWS-documentation example
  # secret access key that has appeared in Amazon's official SDK and IAM
  # guides for over a decade.  It appears in docs/engines.md and
  # docs/operations.md to illustrate the two-line credential file format
  # required by the broker's -s3-credential-file flag.  This value is
  # publicly known, widely published, and carries no authentication
  # capability against any real AWS account.
  regexes = [
    "wJalrXUtnFEMI/K7MDENG",
  ]

  # Confine the allowlist to documentation files only: a real credential
  # accidentally placed outside docs/ would NOT be suppressed.
  paths = [
    "docs/",
  ]
