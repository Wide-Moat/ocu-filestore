#
# go-gremlins mutation-testing configuration. Auto-discovered at the module
# root by `gremlins unleash` (and by `make mutation` and the mutation CI job),
# so the scope lives here in one place instead of being duplicated across the
# command lines.
#
# Scope: the pure-logic guard sites where mutation testing has the highest
# signal and the suite is fast — the authorization resolver, the deny-class
# vocabulary, the per-session ceilings, AND the two highest-stakes containment
# guards: the credential-scope derivation (credscope.go, "never a signing key")
# and the path-containment resolver (pathresolver.go, "never a path outside the
# attested prefix"). The S3 / socket / streaming source FILES in southface and
# objectstore are NOT mutated (the loop in mutation.yml / the Makefile mutates
# only the guard source paths) because they need the live MinIO rig and the
# peer-credential socket, which would make a mutation run enormous for little
# added signal over their own conformance and e2e suites — coverpkg merely
# widens coverage collection so the two guard files are attributed.
#
# coverpkg restricts coverage collection to those packages; the path argument
# passed on the command line restricts which source files are mutated. Keep
# the two in agreement.
#
# Schema reference: https://github.com/go-gremlins/gremlins
unleash:
  coverpkg: ./internal/authz/...,./internal/denyclass/...,./internal/ceilings/...,./internal/southface/...,./internal/objectstore/...
  # Thresholds STAY 0 (advisory) — NOT a green-washed ratchet. The blocker is
  # gremlins-side and version-independent of the Go toolchain: go-gremlins
  # v0.6.0 derives the module path by reading ONLY THE FIRST LINE of go.mod and
  # calling TrimPrefix("module ") on it (its modPkg() helper — it does not use a
  # real go.mod parser). This repo's go.mod is comment-led: a 3-line SPDX /
  # dependency-policy comment precedes the directive, so `module ...` is on
  # line 4. gremlins therefore captures the COMMENT text as the module name, so
  # its coverage filename keys never match the real package paths and EVERY
  # mutant is reported "Not covered" (a phantom 0 killed / 0 lived) across ALL
  # in-scope packages — authz, ceilings, denyclass, AND the containment guards
  # (credscope, pathresolver) — despite their mandatory property-tests. Go
  # 1.26.4 native coverage is correct; this is purely the gremlins first-line
  # parse, not a Go toolchain break and not an unmeasured-baseline problem.
  # With only a phantom number to read, any non-zero threshold would pass or
  # fail on a lie, so arming the gate would be a FALSE ratchet — an honest
  # advisory beats a green-looking lie. Ratchet condition: the gate can arm
  # once the mutation tool resolves the module path correctly for a comment-led
  # go.mod (a fixed gremlins release, a different tool such as go-mutesting
  # which resolves packages via `go list`, OR moving the module directive to
  # line 1 — note the trade-off: that would drop the SPDX/policy preamble, so
  # do NOT do it lightly) AND reports a stable, correct efficacy figure; then
  # set threshold.efficacy / threshold.mutant-coverage to floor(baseline) and
  # drop continue-on-error in mutation.yml. Tracked: docs/ROADMAP.md "mutation
  # gate arm" follow-up.
  threshold:
    efficacy: 0
    mutant-coverage: 0
